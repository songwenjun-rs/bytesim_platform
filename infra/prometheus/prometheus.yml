# ByteSim Prometheus scrape config.
# Phase 0.3: 3 services instrumented (BFF + engine-svc + run-svc).
# The other services will land in Phase 1 when we extract _obs to a shared
# package — until then they're listed below as commented-out entries that the
# operator can enable by uncommenting after instrumenting their main.py.

global:
  scrape_interval: 5s
  evaluation_interval: 15s
  external_labels:
    platform: bytesim
    env: dev

scrape_configs:
  - job_name: bff
    metrics_path: /metrics
    static_configs:
      - targets: [bff:8080]
        labels:
          service: bff

  - job_name: engine-svc
    metrics_path: /metrics
    static_configs:
      - targets: [engine-svc:8087]
        labels:
          service: engine-svc

  - job_name: run-svc
    metrics_path: /metrics
    static_configs:
      - targets: [run-svc:8081]
        labels:
          service: run-svc

  # Phase 1 rollout — uncomment after wiring _obs.py into each main.py.
