[project]
name = "bytesim-astra-sim-svc"
version = "0.2.0"
description = "Wraps astra-sim's analytical backend as a ByteSim end-to-end engine plugin. RFC-003 ships chakra ET writer for arbitrary (transformer-dense × TP × PP × DP)."
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "pydantic>=2.9",
  "httpx>=0.27",          # required by shared/engine_runtime registration loop
  # The vendored et_def_pb2.py was generated by protoc 6.x and uses the
  # `runtime_version` API only available in protobuf >= 5.27. Pinning the
  # floor here keeps `pip-compile` from accidentally resolving to 4.25.x.
  "protobuf>=5.27",       # chakra ET serialisation (RFC-003)
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]
